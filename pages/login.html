<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Echocardiography System</title>
    <link rel="icon" href="../favicon.png">
    <style>
        :root {
            --primary-50: #fef2f2;
            --primary-100: #fee2e2;
            --primary-200: #fecaca;
            --primary-300: #fca5a5;
            --primary-400: #f87171;
            --primary-500: #ef4444;
            --primary-600: #dc2626;
            --primary-700: #b91c1c;
            --primary-800: #991b1b;
            --primary-900: #7f1d1d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-700);
            margin-bottom: 0.5rem;
        }

        .login-logo svg {
            width: 40px;
            height: 40px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }

        .form-input {
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.35);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .login-footer a {
            color: #dc2626;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: none;
        }

        .alert.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
                <span>Echo System</span>
            </div>
            <p>Cardiac Technologist Login</p>
        </div>

        <div id="loginAlert" class="alert"></div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="technologist@echosystem.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>

        <div class="login-footer">
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        // Pre-defined technologist credentials (no API - pure localStorage)
        const TECHNOLOGIST_CREDENTIALS = {
            email: 'tech@echosystem.com',
            password: 'tech123',
            name: 'Cardiac Technologist',
            role: 'technologist'
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const alert = document.getElementById('loginAlert');
            const submitBtn = document.querySelector('.btn-login');
            
            // Disable button during login
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            // Simple local validation (no API call)
            if (email === TECHNOLOGIST_CREDENTIALS.email && password === TECHNOLOGIST_CREDENTIALS.password) {
                // Store user session in localStorage
                localStorage.setItem('echotech_currentUser', JSON.stringify({
                    id: 1,
                    email: TECHNOLOGIST_CREDENTIALS.email,
                    name: TECHNOLOGIST_CREDENTIALS.name,
                    role: TECHNOLOGIST_CREDENTIALS.role,
                    loggedInAt: new Date().toISOString()
                }));
                
                // Redirect to technologist dashboard
                window.location.href = 'technologist.html';
            } else {
                alert.textContent = 'Invalid email or password. Use: tech@echosystem.com / tech123';
                alert.className = 'alert error';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login to Dashboard';
            }
        });
    </script>
</body>
</html>
